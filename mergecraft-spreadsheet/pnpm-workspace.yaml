# pnpm 11 reads build-script approvals from here (the package.json `pnpm` field
# is no longer read). These two transitive native deps don't need their build
# scripts for this tool's `vite build`, so they're explicitly denied.
allowBuilds:
  cbor-extract: false
  esbuild: false

# Force a single `@automerge/automerge-repo` across the whole tree so the
# `DocHandle<Doc>` from `patchwork-plugins` and from `bireactive` unify. The host
# externalizes this dep and serves `2.6.0-subduction.37`, so pinning matches the
# runtime too.
overrides:
  "@automerge/automerge-repo": 2.6.0-subduction.37
